<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Generator</title>
    <style>
        /* nasic reset  centering the card */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: #f5f5f5; 
            display: flex; 
            justify-content: center; 
            padding: 40px 20px; 
        }

        .card { 
            background: #ffffff; 
            border-radius: 12px; 
            border: 1px solid #ddd; 
            padding: 24px; 
            width: 100%; 
            max-width: 400px; 
        }

        h1 { 
            font-size: 20px; 
            margin-bottom: 20px; 
            color: #222; 
        }

        /* layout for the length slider */
        .len-row { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            margin-bottom: 15px; 
            font-size: 14px; 
        }
        .len-row input { flex-grow: 1; cursor: pointer; }

        .row { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            margin-bottom: 10px; 
            font-size: 14px; 
            color: #444;
        }

        /* password display area */
        #output { 
            background: #f1f1f1; 
            border-radius: 8px; 
            padding: 15px; 
            font-family: 'Courier New', monospace; 
            font-size: 16px; 
            margin: 15px 0; 
            min-height: 52px; 
            word-break: break-all;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #e0e0e0;
        }

        .actions { display: flex; gap: 10px; margin-top: 5px; }

        button { 
            flex: 1; 
            padding: 10px; 
            border-radius: 7px; 
            border: 1px solid #ccc; 
            cursor: pointer; 
            font-size: 14px; 
            transition: 0.2s;
        }

        .btn-blue { 
            background: #185FA5; 
            color: white; 
            border: none;
            font-weight: 600;
        }

        /* strength badges */
        .tag { 
            font-size: 11px; 
            padding: 2px 12px; 
            border-radius: 50px; 
            display: inline-block; 
            margin-bottom: 10px; 
            font-weight: bold;
            text-transform: uppercase;
        }

        .weak { background: #ffdada; color: #8b0000; }
        .medium { background: #fff4d1; color: #856404; }
        .strong { background: #d4edda; color: #155724; }
    </style>
</head>
<body>

<div class="card">
    <h1>Password Generator</h1>
    
    <div class="len-row">
        <label>Size:</label>
        <input type="range" min="8" max="32" value="12" id="slider">
        <b id="num">12</b>
    </div>

    <div class="row"><input type="checkbox" id="upper" checked> <label for="upper">Uppercase</label></div>
    <div class="row"><input type="checkbox" id="lower" checked> <label for="lower">Lowercase</label></div>
    <div class="row"><input type="checkbox" id="nums" checked> <label for="nums">Numbers</label></div>
    <div class="row"><input type="checkbox" id="syms"> <label for="syms">Symbols</label></div>

    <div id="output">Click Generate</div>
    
    <span id="strength" class="tag" style="display:none;"></span>

    <div class="actions">
        <button class="btn-blue" onclick="main()">Generate</button>
        <button id="copy" onclick="copy()">Copy</button>
    </div>
</div>

<script>
    var range = document.getElementById("slider");
    var label = document.getElementById("num");

    // updates the number label when slider moves
    range.oninput = function() {
        label.innerHTML = this.value;
    }

    function main() {
        let len = parseInt(range.value);
        let characters = "";
        let result = "";

        // add characters based on which boxes are checked
        if (document.getElementById("upper").checked) { characters += "ABCDEFGHIJKLMNOPQRSTUVWXYZ"; }
        if (document.getElementById("lower").checked) { characters += "abcdefghijklmnopqrstuvwxyz"; }
        if (document.getElementById("nums").checked) { characters += "0123456789"; }
        if (document.getElementById("syms").checked) { characters += "!@#$%^&*()_+-="; }

        // Validation if nothing is selected
        if (characters == "") {
            alert("Pick at least one option!");
            return;
        }

        // random pick loop
        for (var i = 0; i < len; i++) {
            var r = Math.floor(Math.random() * characters.length);
            result += characters.charAt(r);
        }

        document.getElementById("output").innerText = result;

        // visual feedback for password strength
        var tag = document.getElementById("strength");
        tag.style.display = 'inline-block';
        
        if (len < 10) {
            tag.innerText = "Weak";
            tag.className = "tag weak";
        } else if (len < 16) {
            tag.innerText = "Medium";
            tag.className = "tag medium";
        } else {
            tag.innerText = "Strong";
            tag.className = "tag strong";
        }
    }

    // handle clipboard copy
    function copy() {
        var text = document.getElementById("output").innerText;
        if (text == "Click Generate") return;

        navigator.clipboard.writeText(text);

        // Simple button text toggle
        var b = document.getElementById("copy");
        b.innerText = "Copied!";
        setTimeout(function() {
            b.innerText = "Copy";
        }, 1200);
    }
</script>

</body>
</html>
